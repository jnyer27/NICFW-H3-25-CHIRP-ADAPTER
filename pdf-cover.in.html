<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <style>
    @page { margin: 0; }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, Helvetica, sans-serif;
      background: #ffffff;
      color: #111;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      /* Left accent bar via border — stays at the true page edge */
      border-left: 8px solid #222;
      padding: 72px 64px;
    }

    .badge {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 40px;
      font-weight: 700;
      line-height: 1.15;
      color: #111;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 18px;
      font-weight: 400;
      color: #444;
      margin-bottom: 48px;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: #222;
      margin-bottom: 48px;
    }

    .meta {
      font-size: 13px;
      color: #555;
      line-height: 2;
    }

    .footer {
      position: absolute;
      bottom: 40px;
      left: 72px;     /* aligned with body padding */
      font-size: 10px;
      color: #aaa;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="badge">User Guide &middot; App v__APP_VERSION__</div>
  <h1>NICFW TD-H3 25<br>Channel Editor</h1>
  <h2>Android App &mdash; Complete User Guide</h2>
  <div class="divider"></div>
  <div class="meta">
    github.com/jnyer27/NICFW-H3-25-CHIRP-ADAPTER<br>
    CHIRP-compatible &nbsp;&middot;&nbsp; USB OTG &nbsp;&middot;&nbsp; Android
  </div>
  <div class="footer">NICFW &nbsp;&middot;&nbsp; nicfw-td-h3-editor</div>
</body>
</html>
