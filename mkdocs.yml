site_name: NICFW TD-H3 25 Channel Editor
site_description: User Guide for the NICFW TD-H3 25 Android Channel Editor
site_author: NICFW
site_url: https://jnyer27.github.io/NICFW-H3-25-CHIRP-ADAPTER/

repo_name: jnyer27/NICFW-H3-25-CHIRP-ADAPTER
repo_url: https://github.com/jnyer27/NICFW-H3-25-CHIRP-ADAPTER

docs_dir: docs
site_dir: site

hooks:
  - docs/hooks.py

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.top
    - navigation.sections
    - navigation.expand
    - toc.integrate
    - search.highlight
    - search.share
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
      title: On this page
  - attr_list
  - def_list
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - User Guide: index.md

plugins:
  - search
  - exporter:
      formats:
        pdf:
          enabled: true
          concurrency: 1
          covers:
            front: docs/pdf-cover.html
          browser:
            headless: true
          aggregator:
            enabled: true
            output: user-guide.pdf
            covers: front
          stylesheets:
            - docs/stylesheets/pdf.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jnyer27/NICFW-H3-25-CHIRP-ADAPTER
